<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="estilos.css">
</head>


<body>


<button class="dark-btn" onclick="toggleDark()">
    ◑
</button>



<div class="container">


 

    <div id="loginBox" class="card">

        <h1>Iniciar Sesión</h1>


        <input type="email"
               id="correo"
               placeholder="Correo"
               required>


        <input type="password"
               id="clave"
               placeholder="Contraseña"
               required>


        <p id="errorLogin" style="color:red;"></p>


        <button type="button" onclick="login()">
        Ingresar
       </button>


        <p>
            ¿No tienes cuenta?
            <a href="#" onclick="mostrarRegistro()">
                Regístrate
            </a>
        </p>


    </div>




   


    <div id="registroBox" class="card" style="display:none;">


        <h1>Crear Cuenta</h1>



        <input type="email"
               id="nuevoCorreo"
               placeholder="Correo"
               required>




        <input type="password"
               id="nuevaClave"
               placeholder="Contraseña"
               required
               minlength="8">




        <p id="errorRegistro" style="color:red;"></p>




        <button type="button" onclick="login()">
        crear cuenta
        </button> 



        <p>

            ¿Ya tienes cuenta?

            <a href="#" onclick="mostrarLogin()">
                Inicia sesión
            </a>

        </p>



    </div>



</div>





<script>




function mostrarRegistro(){


    document.getElementById("loginBox").style.display = "none";


    document.getElementById("registroBox").style.display = "block";


}





function mostrarLogin(){


    document.getElementById("registroBox").style.display = "none";


    document.getElementById("loginBox").style.display = "block";


}








function registro(){


    const correo = document
    .getElementById("nuevoCorreo")
    .value
    .trim();



    const clave = document
    .getElementById("nuevaClave")
    .value;



    const error = document
    .getElementById("errorRegistro");



    error.textContent = "";




    if(!correo || !clave){


        error.textContent =
        "Debe completar todos los campos.";


        return;


    }





    const regexEmail =
    /^[^\s@]+@[^\s@]+\.[^\s@]+$/;




    if(!regexEmail.test(correo)){


        error.textContent =
        "Ingrese un correo válido.";


        return;


    }





    if(clave.length < 8){


        error.textContent =
        "La contraseña debe tener mínimo 8 caracteres.";


        return;


    }





    if(localStorage.getItem(correo)){


        error.textContent =
        "Ese usuario ya existe.";


        return;


    }





    localStorage.setItem(correo, clave);



    alert("Usuario creado correctamente");



    mostrarLogin();



}












function login(){



    const correo = document
    .getElementById("correo")
    .value
    .trim();



    const clave =
    document.getElementById("clave").value;




    const error =
    document.getElementById("errorLogin");




    error.textContent = "";





    if(!correo || !clave){


        error.textContent =
        "Debe ingresar correo y contraseña.";


        return;


    }





    const claveGuardada =
    localStorage.getItem(correo);





    if(claveGuardada === null){


        error.textContent =
        "El usuario no existe.";


        return;


    }






    if(claveGuardada !== clave){


        error.textContent =
        "Contraseña incorrecta.";


        return;


    }





    localStorage.setItem(
        "usuarioActivo",
        correo
    );





    location.href =
    "sistema.html";



}





</script>







<script>








function toggleDark(){


    document.body.classList.toggle("dark");



    if(document.body.classList.contains("dark")){


        localStorage.setItem(
            "modo",
            "dark"
        );


    }else{


        localStorage.setItem(
            "modo",
            "light"
        );


    }


}








window.onload = function(){



    if(localStorage.getItem("modo") === "dark"){


        document.body.classList.add("dark");


    }


}




</script>





</body>

</html>
