<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Inventario</title>
<link rel="stylesheet" href="estilos.css">
</head>


<body>


<button class="dark-btn" onclick="toggleDark()">
    ◑
</button>



<div class="card">


<h1>Inventario</h1>



<input type="text"
id="producto"
placeholder="Nombre del producto"
required
minlength="3"
maxlength="50">




<input type="number"
       id="cantidad"
       placeholder="Cantidad"
       min="1"
       required>




<input type="text"
       id="descripcion"
       placeholder="Descripción (opcional)"
       maxlength="100">




<p id="errorInventario" style="color:red;"></p>




<button onclick="agregarProducto()">
    Agregar producto
</button>




<button onclick="location.href='sistema.html'">
    Volver al sistema
</button>



</div>





<script>


function agregarProducto(){



    const producto =
    document.getElementById("producto").value.trim();



    const cantidad =
    document.getElementById("cantidad").value;



    const descripcion =
    document.getElementById("descripcion").value;



    const error =
    document.getElementById("errorInventario");



    error.textContent = "";





    if(!producto || !cantidad){


        error.textContent =
        "El nombre y la cantidad son obligatorios.";


        return;


    }





    if(producto.length < 3){


        error.textContent =
        "El nombre del producto debe tener mínimo 3 caracteres.";


        return;


    }





    if(cantidad <= 0){


        error.textContent =
        "La cantidad debe ser mayor a cero.";


        return;


    }





    alert("Producto agregado correctamente");



    document.getElementById("producto").value="";
    document.getElementById("cantidad").value="";
    document.getElementById("descripcion").value="";



}







function toggleDark(){


    document.body.classList.toggle("dark");



    if(document.body.classList.contains("dark")){


        localStorage.setItem("modo","dark");


    }else{


        localStorage.setItem("modo","light");


    }


}





window.onload = function(){


    if(localStorage.getItem("modo") === "dark"){


        document.body.classList.add("dark");


    }


}



</script>



</body>

</html>
