<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Incidencias</title>
<link rel="stylesheet" href="estilos.css">
</head>


<body>


<button class="dark-btn" onclick="toggleDark()">
    ◑
</button>



<div class="card">


<h1>Registro de Incidencias</h1>



<input type="text"
       id="titulo"
       placeholder="Título de la incidencia"
       required
       minlength="5"
       maxlength="50">




<input type="text"
       id="descripcion"
       placeholder="Descripción del problema"
       required
       minlength="10"
       maxlength="200">




<input type="text"
       id="area"
       placeholder="Área o departamento"
       required
       minlength="3"
       maxlength="50">


<p id="errorIncidencia" style="color:red;"></p>



<button onclick="guardarIncidencia()">
    Guardar incidencia
</button>



<button onclick="location.href='sistema.html'">
    Volver al sistema
</button>



</div>





<script>


function guardarIncidencia(){


    const titulo =
    document.getElementById("titulo").value.trim();



    const descripcion =
    document.getElementById("descripcion").value.trim();



    const area =
    document.getElementById("area").value.trim();



    const error =
    document.getElementById("errorIncidencia");



    error.textContent = "";





    if(!titulo || !descripcion || !area){


        error.textContent =
        "Debe completar todos los campos.";


        return;


    }





    if(titulo.length < 5){


        error.textContent =
        "El título debe tener al menos 5 caracteres.";


        return;


    }





    if(descripcion.length < 10){


        error.textContent =
        "La descripción debe ser más detallada.";


        return;


    }





    alert("Incidencia guardada correctamente");



    document.getElementById("titulo").value="";
    document.getElementById("descripcion").value="";
    document.getElementById("area").value="";



}






function toggleDark(){


    document.body.classList.toggle("dark");



    if(document.body.classList.contains("dark")){


        localStorage.setItem("modo","dark");


    }else{


        localStorage.setItem("modo","light");


    }


}





window.onload = function(){



    if(localStorage.getItem("modo") === "dark"){


        document.body.classList.add("dark");


    }


}



</script>



</body>

</html>
