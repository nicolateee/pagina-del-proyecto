<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | SGRSI</title>
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="tema.css">
    <link rel="stylesheet" href="componentes.css">
    <link rel="stylesheet" href="layout.css">
    <script src="navegacion.js" defer></script>
    <script src="autenticacion.js" defer></script>
    <script src="tema.js" defer></script>
</head>
<body>
    <!-- PÁGINA DE REGISTRO -->
    <button class="dark-btn" onclick="toggleDark()">◑</button>

    <div class="login-container">
        <div class="card">
            <h1>Crear Cuenta</h1>
            <input type="email" id="nuevoCorreo" placeholder="Correo" required>
            <input type="password" id="nuevaClave" placeholder="Contraseña" required minlength="8">
            <p id="errorRegistro" style="color:red;"></p>
            <button onclick="registro()">Crear cuenta</button>
            <p>¿Ya tienes cuenta? <a onclick="mostrarLogin()">Inicia sesión</a></p>
        </div>
    </div>
</body>
</html>
