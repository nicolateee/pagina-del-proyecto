<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Servicio</title>
<link rel="stylesheet" href="estilos.css">
</head>


<body>


<button class="dark-btn" onclick="toggleDark()">
    ◑
</button>



<div class="card">


<h1>Solicitud de Servicio</h1>



<input type="text"
       id="tipoServicio"
       placeholder="Tipo de servicio"
       required>




<input type="text"
       id="descripcionServicio"
       placeholder="Descripción del servicio"
       required>




<input type="text"
       id="prioridad"
       placeholder="Prioridad (Alta / Media / Baja)"
       required>




<p id="errorServicio" style="color:red;"></p>



<button onclick="enviarSolicitud()">
    Enviar solicitud
</button>




<button onclick="location.href='sistema.html'">
    Volver al sistema
</button>



</div>





<script>



function enviarSolicitud(){



    const tipo =
    document.getElementById("tipoServicio").value.trim();



    const descripcion =
    document.getElementById("descripcionServicio").value.trim();



    const prioridad =
    document.getElementById("prioridad").value.trim().toLowerCase();



    const error =
    document.getElementById("errorServicio");



    error.textContent = "";





    if(!tipo || !descripcion || !prioridad){


        error.textContent =
        "Debe completar todos los campos.";


        return;


    }





    if(tipo.length < 3){


        error.textContent =
        "El tipo de servicio debe tener al menos 3 caracteres.";


        return;


    }





    if(descripcion.length < 10){


        error.textContent =
        "La descripción debe ser más detallada.";


        return;


    }





    if(
        prioridad !== "alta" &&
        prioridad !== "media" &&
        prioridad !== "baja"
    ){


        error.textContent =
        "La prioridad debe ser Alta, Media o Baja.";


        return;


    }





    alert("Solicitud enviada correctamente");



    document.getElementById("tipoServicio").value="";
    document.getElementById("descripcionServicio").value="";
    document.getElementById("prioridad").value="";



}







function toggleDark(){


    document.body.classList.toggle("dark");



    if(document.body.classList.contains("dark")){


        localStorage.setItem("modo","dark");


    }else{


        localStorage.setItem("modo","light");


    }


}





window.onload = function(){


    if(localStorage.getItem("modo") === "dark"){


        document.body.classList.add("dark");


    }


}



</script>



</body>

</html>
